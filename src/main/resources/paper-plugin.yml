name: SnowCraft
version: '1.0-SNAPSHOT'
main: br.com.caiomoizes.snowCraft.SnowCraft
api-version: '1.21'
commands:
  register:
    aliases: [register,registrar]
    usage: /<command> <senha> <confirmaSenha>
    description: Registrar sua conta
    permission: register.use
  login:
    aliases: [login,logar]
    usage: /<command> <senha>
    description: Logar na sua conta
    permission: login.use
  saldo:
    aliases: [saldo,bal]
    usage: /<command>
    description: Exibir saldo da conta
    permission: saldo.use
  pay:
    aliases: [pay,pagar]
    usage: /<command> <jogador> <valor>
    description: Transferir para um jogador
    permission: pay.use
